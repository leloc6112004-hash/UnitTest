spring.application.name=basic-project-spring
server.port=8080

spring.datasource.url=jdbc:h2:mem:basicdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Khớp path có/không dấu / cuối (giống client React gọi /auth/token/)
spring.mvc.trailing-slash-match=true

jwt.secret=ChangeThisToAVeryLongSecretKeyAtLeast32BytesForHS256Alg123456789=
jwt.access-expiration-minutes=60
jwt.refresh-expiration-days=7

logging.level.org.springframework.security=INFO
